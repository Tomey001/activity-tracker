services:
  - type: web
    name: activity-tracker
    runtime: php
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      npm install
      npm run build
      php artisan config:clear
      php artisan cache:clear
    startCommand: php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_NAME
        value: "Activity Tracker"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: nozomi.proxy.rlwy.net
      - key: DB_PORT
        value: 58467
      - key: DB_DATABASE
        value: railway
      - key: DB_USERNAME
        value: root
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_DRIVER
        value: database